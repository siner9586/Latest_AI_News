name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install -r requirements.txt
      - run: npm install
      - run: python -m latest_ai_news.pipeline.run_daily --max-items 18
      - run: python scripts/check_sources.py
      - run: python scripts/validate_daily.py
      - run: npm run build
