name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: pip install -r requirements.txt
      - run: npm ci
      - name: Generate latest brief
        run: python -m latest_ai_news.pipeline.run_daily --max-items 18
        env:
          LOCALIZATION_PROVIDER: ${{ vars.LOCALIZATION_PROVIDER || 'rule' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
      - name: Backfill localized fields
        shell: bash
        run: |
          set -euo pipefail
          DATE=$(python -c 'import json; print(json.load(open("data/index/latest.json"))["date"])')
          python scripts/backfill_localized_items.py --date "$DATE"
      - run: python scripts/check_sources.py
      - run: python scripts/validate_daily.py
      - run: npm run build
