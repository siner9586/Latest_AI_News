name: Daily AI News

on:
  schedule:
    # Primary run: 06:18 Beijing/Taipei time = 22:18 UTC on the previous day.
    - cron: '18 22 * * *'
    # Redundant compensation checks every 15 minutes through 09:33 Beijing/Taipei time.
    - cron: '33 22 * * *'
    - cron: '48 22 * * *'
    - cron: '3 23 * * *'
    - cron: '18 23 * * *'
    - cron: '33 23 * * *'
    - cron: '48 23 * * *'
    - cron: '3 0 * * *'
    - cron: '18 0 * * *'
    - cron: '33 0 * * *'
    - cron: '48 0 * * *'
    - cron: '3 1 * * *'
    - cron: '18 1 * * *'
    - cron: '33 1 * * *'
  # Safety guard: when the daily pipeline/workflow/runtime itself is repaired on main,
  # run once immediately. The idempotency gate below prevents duplicate issues.
  push:
    branches:
      - main
    paths:
      - '.github/workflows/daily-news.yml'
      - 'latest_ai_news/**'
      - 'scripts/**'
      - 'requirements.txt'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
      - '.node-version'
  workflow_dispatch:
    inputs:
      publish_date:
        description: 'YYYY-MM-DD'
        required: false
      source_date:
        description: 'Optional source date'
        required: false
      force:
        description: 'Force regeneration'
        required: false
        default: 'false'
      dry_run:
        description: 'Run without committing'
        required: false
        default: 'false'
      max_items:
        description: 'Max selected items'
        required: false
        default: '18'
      language:
        description: 'all / zh / en'
        required: false
        default: 'all'

permissions:
  contents: write

concurrency:
  group: latest-ai-news-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve publish date and idempotency gate
        id: gate
        shell: bash
        env:
          INPUT_PUBLISH_DATE: ${{ github.event.inputs.publish_date || '' }}
          INPUT_FORCE: ${{ github.event.inputs.force || 'false' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          git pull --ff-only origin "${GITHUB_REF_NAME:-main}" || true

          DATE="$INPUT_PUBLISH_DATE"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Taipei date +%F)
          fi

          SKIP=false
          if [ "$INPUT_FORCE" != "true" ] && [ "$INPUT_DRY_RUN" != "true" ] \
            && [ -f "data/daily/${DATE}.json" ] \
            && [ -f "content/zh/daily/${DATE}.md" ] \
            && [ -f "content/en/daily/${DATE}.md" ] \
            && grep -q '"localized_url"' "data/daily/${DATE}.json"; then
            SKIP=true
          fi

          {
            echo "date=$DATE"
            echo "force=$INPUT_FORCE"
            echo "dry_run=$INPUT_DRY_RUN"
            echo "skip=$SKIP"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Daily AI News gate"
            echo "- publish_date: $DATE"
            echo "- force: $INPUT_FORCE"
            echo "- dry_run: $INPUT_DRY_RUN"
            echo "- skip_existing_localized_issue: $SKIP"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$SKIP" = "true" ]; then
            echo "Localized daily issue for ${DATE} already exists. Skip this redundant run."
          fi

      - uses: actions/setup-python@v5
        if: ${{ steps.gate.outputs.skip != 'true' }}
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        if: ${{ steps.gate.outputs.skip != 'true' }}
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: pip install -r requirements.txt
        if: ${{ steps.gate.outputs.skip != 'true' }}

      - run: npm ci
        if: ${{ steps.gate.outputs.skip != 'true' }}

      - name: Generate brief
        if: ${{ steps.gate.outputs.skip != 'true' }}
        shell: bash
        env:
          PUBLISH_DATE: ${{ steps.gate.outputs.date }}
          SOURCE_DATE: ${{ github.event.inputs.source_date || '' }}
          MAX_ITEMS: ${{ github.event.inputs.max_items || '18' }}
          LANGUAGE: ${{ github.event.inputs.language || 'all' }}
          FORCE: ${{ steps.gate.outputs.force }}
          DRY_RUN: ${{ steps.gate.outputs.dry_run }}
          LOCALIZATION_PROVIDER: ${{ vars.LOCALIZATION_PROVIDER || 'rule' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
        run: |
          set -euo pipefail
          ARGS=(--date "$PUBLISH_DATE" --max-items "$MAX_ITEMS" --language "$LANGUAGE")
          if [ -n "$SOURCE_DATE" ]; then ARGS+=(--source-date "$SOURCE_DATE"); fi
          if [ "$FORCE" = "true" ]; then ARGS+=(--force); fi
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          python -m latest_ai_news.pipeline.run_daily "${ARGS[@]}"

      - name: Backfill localized fields
        if: ${{ steps.gate.outputs.skip != 'true' && steps.gate.outputs.dry_run != 'true' }}
        run: python scripts/backfill_localized_items.py --date "${{ steps.gate.outputs.date }}"

      - run: python scripts/validate_daily.py
        if: ${{ steps.gate.outputs.skip != 'true' && steps.gate.outputs.dry_run != 'true' }}

      - run: npm run build
        if: ${{ steps.gate.outputs.skip != 'true' && steps.gate.outputs.dry_run != 'true' }}

      - name: Commit generated content
        if: ${{ steps.gate.outputs.skip != 'true' && steps.gate.outputs.dry_run != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data content public/rss.xml public/robots.txt
          if git diff --cached --quiet; then
            echo "No content changes"
            exit 0
          fi
          git commit -m "chore: update daily AI news"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}" || true
          git push
